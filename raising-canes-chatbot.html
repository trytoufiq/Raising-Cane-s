<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e31837;--red-dark:#b8102b;--cream:#fff8f0;
  --white:#ffffff;--gray:#f2f2f2;--gray2:#e0e0e0;
  --text:#1a1a1a;--muted:#777;
  --shadow:0 8px 32px rgba(227,24,55,.20);
  --radius:18px;
}
body{font-family:'Nunito',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* DEMO BG */
.demo-area{text-align:center;max-width:480px}
.demo-area h1{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--red);letter-spacing:1px;line-height:1}
.demo-area p{color:var(--muted);margin-top:10px;font-size:15px}
.demo-area .arrow{margin-top:28px;font-size:13px;color:var(--red);font-weight:700;display:inline-block;animation:ab 1.5s infinite}
@keyframes ab{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* LAUNCHER */
#rc-launcher{
  position:fixed;bottom:28px;right:28px;
  width:68px;height:68px;border-radius:50%;
  background:#fff;border:3px solid var(--red);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);z-index:9999;
  transition:transform .2s,box-shadow .2s;
  overflow:hidden;padding:0;
}
#rc-launcher:hover{transform:scale(1.08);box-shadow:0 12px 40px rgba(227,24,55,.35)}
#rc-launcher img#rc-launcher-logo{
  width:100%;height:100%;
  object-fit:cover;border-radius:50%;
  pointer-events:none;display:block;
}
#rc-badge{
  position:absolute;top:-5px;right:-5px;
  width:20px;height:20px;background:#fff;color:var(--red);
  border-radius:50%;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--red);animation:pulse 2s infinite;
  z-index:10000;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}

/* CHATBOX */
#rc-chatbox{
  position:fixed;bottom:108px;right:28px;
  width:380px;max-height:640px;
  background:var(--white);border-radius:var(--radius);
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  display:none;flex-direction:column;overflow:hidden;
  z-index:9998;
}
#rc-chatbox.rc-open{display:flex}

/* HEADER */
.rc-header{
  background:var(--red);padding:16px 18px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.rc-header-ava{
  width:44px;height:44px;border-radius:50%;
  background:white;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:2px solid rgba(255,255,255,.4);
  font-size:22px;
}
.rc-header-info{flex:1}
.rc-header-info h4{font-family:'Bebas Neue',sans-serif;font-size:20px;color:white;letter-spacing:.5px;line-height:1.1}
.rc-header-info p{font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:4px}
.rc-header-info p::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80}
.rc-close{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;line-height:1}
.rc-close:hover{background:rgba(255,255,255,.2)}

/* STICKY BAR */
.rc-sticky{
  background:var(--red-dark);
  display:flex;justify-content:space-around;
  padding:8px 4px;flex-shrink:0;
}
.rc-sticky-btn{
  background:none;border:none;color:white;
  font-size:10px;font-weight:700;font-family:'Nunito',sans-serif;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 6px;border-radius:8px;transition:background .15s;
  text-transform:uppercase;letter-spacing:.4px;
}
.rc-sticky-btn:hover{background:rgba(255,255,255,.15)}
.rc-sticky-btn .si{font-size:16px}

/* MESSAGES */
.rc-messages{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.rc-messages::-webkit-scrollbar{width:4px}
.rc-messages::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:4px}

.rc-msg{display:flex;gap:8px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rc-msg.rc-bot{align-items:flex-end}
.rc-msg.rc-user{flex-direction:row-reverse}
.rc-ava{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.rc-bubble{
  max-width:82%;padding:10px 14px;
  border-radius:16px;font-size:13.5px;line-height:1.55;word-break:break-word;
}
.rc-bot .rc-bubble{background:var(--gray);color:var(--text);border-bottom-left-radius:4px}
.rc-user .rc-bubble{background:var(--red);color:white;border-bottom-right-radius:4px}
.rc-bubble strong{font-weight:800}
.rc-bubble a{color:var(--red);text-decoration:underline}
.rc-user .rc-bubble a{color:#ffe0e6}

/* EXTRA CONTENT */
.rc-extra{padding-left:38px;display:flex;flex-direction:column;gap:8px;animation:fadeUp .3s ease}

/* QUICK REPLIES */
.rc-qr{display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 8px;flex-shrink:0}
.rc-qr-btn{
  background:none;border:1.5px solid var(--red);color:var(--red);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  padding:6px 12px;border-radius:20px;cursor:pointer;
  transition:background .15s,color .15s;white-space:nowrap;
}
.rc-qr-btn:hover{background:var(--red);color:white}

/* INPUT */
.rc-input-row{
  padding:12px 14px;border-top:1px solid var(--gray2);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
#rc-input{
  flex:1;border:1.5px solid var(--gray2);border-radius:12px;
  padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13.5px;
  resize:none;outline:none;transition:border-color .2s;
  max-height:90px;line-height:1.4;
}
#rc-input:focus{border-color:var(--red)}
#rc-send{
  width:40px;height:40px;background:var(--red);border:none;
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background .2s,transform .15s;
}
#rc-send:hover{background:var(--red-dark);transform:scale(1.05)}
#rc-send svg{width:18px;height:18px;fill:white;pointer-events:none}

/* TYPING */
.rc-typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.rc-typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.rc-typing span:nth-child(2){animation-delay:.2s}
.rc-typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* CALL CARD */
.rc-call-card{
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  border-radius:14px;padding:14px 16px;color:white;
}
.rc-call-card p{font-size:12px;opacity:.85;margin-bottom:4px}
.rc-call-card .rc-phone{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.rc-call-card a.rc-call-now{
  display:inline-block;margin-top:8px;background:white;color:var(--red);
  border-radius:20px;padding:7px 18px;font-size:13px;font-weight:800;
  text-decoration:none;transition:opacity .15s;
}
.rc-call-card a.rc-call-now:hover{opacity:.85}

/* LOC CARD */
.rc-loc-card{background:var(--gray);border-radius:12px;padding:12px 14px;font-size:12.5px}
.rc-loc-name{font-weight:800;font-size:13px;color:var(--red);margin-bottom:2px}
.rc-loc-addr{color:var(--muted);margin-bottom:2px}
.rc-loc-hours{font-weight:700;font-size:12px}
.rc-loc-phone{font-size:12px;margin-top:2px}
.rc-loc-card a{
  display:inline-block;margin-top:6px;background:var(--red);color:white;
  padding:5px 12px;border-radius:14px;font-size:11.5px;font-weight:700;text-decoration:none;
}

/* MENU TABLE */
.rc-menu-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.rc-menu-table th{background:var(--red);color:white;padding:6px 8px;text-align:left;font-size:11px}
.rc-menu-table td{padding:6px 8px;border-bottom:1px solid var(--gray2)}
.rc-menu-table tr:last-child td{border-bottom:none}
.rc-menu-table tr:nth-child(even) td{background:var(--cream)}

/* LEAD FORM */
.rc-lead-form{background:var(--cream);border:1.5px solid var(--gray2);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
.rc-lead-form h5{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--red);letter-spacing:.5px}
.rc-lead-form input,.rc-lead-form select,.rc-lead-form textarea{
  border:1.5px solid var(--gray2);border-radius:8px;padding:8px 10px;
  font-family:'Nunito',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .2s;
}
.rc-lead-form input:focus,.rc-lead-form select:focus,.rc-lead-form textarea:focus{border-color:var(--red)}
.rc-lead-form textarea{resize:none;min-height:60px}
.rc-lead-form button{
  background:var(--red);color:white;border:none;border-radius:10px;
  padding:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;transition:background .2s;
}
.rc-lead-form button:hover{background:var(--red-dark)}

@media(max-width:420px){
  #rc-chatbox{width:calc(100vw - 20px);right:10px;bottom:90px}
  #rc-launcher{right:14px;bottom:14px}
}
</style>

// ── DOM REFS ──────────────────────────────────────────────────────
var launcher  = document.getElementById('rc-launcher');
var chatbox   = document.getElementById('rc-chatbox');
var closeBtn  = document.getElementById('rc-close-btn');
var messages  = document.getElementById('rc-messages');
var qrArea    = document.getElementById('rc-qr');
var input     = document.getElementById('rc-input');
var sendBtn   = document.getElementById('rc-send');
var badge     = document.getElementById('rc-badge');
var isOpen    = false;
var greeted   = false;

// ── TOGGLE ────────────────────────────────────────────────────────
function toggleChat(){
  isOpen = !isOpen;
  if(isOpen){
    chatbox.classList.add('rc-open');
    badge.style.display='none';
    if(!greeted){ greeted=true; doGreet(); }
    setTimeout(function(){input.focus()},300);
  } else {
    chatbox.classList.remove('rc-open');
  }
}
launcher.addEventListener('click', toggleChat);
closeBtn.addEventListener('click', toggleChat);

// ── STICKY BAR ────────────────────────────────────────────────────
var stickyMap = {
  call:"I want to call your team",
  locations:"Show me all your locations",
  menu:"Show me the full menu",
  order:"I want to place an order",
  contact:"How can I contact you"
};
document.querySelectorAll('.rc-sticky-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    sendMsg(stickyMap[btn.dataset.action]);
  });
});

// ── INPUT ─────────────────────────────────────────────────────────
sendBtn.addEventListener('click', onSend);
input.addEventListener('keydown', function(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); onSend(); }
});
input.addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,90)+'px';
});
function onSend(){
  var val=input.value.trim();
  if(!val) return;
  sendMsg(val);
}

// ── SCROLL ────────────────────────────────────────────────────────
function scrollBot(){
  setTimeout(function(){ messages.scrollTop=messages.scrollHeight; },60);
}

// ── CLEAR QR ─────────────────────────────────────────────────────
function clearQR(){ qrArea.innerHTML=''; }

// ── SHOW QR ───────────────────────────────────────────────────────
function showQR(opts){
  clearQR();
  opts.forEach(function(o){
    var b=document.createElement('button');
    b.className='rc-qr-btn'; b.textContent=o;
    b.addEventListener('click',function(){ clearQR(); sendMsg(o); });
    qrArea.appendChild(b);
  });
}

// ── ADD BOT MSG ───────────────────────────────────────────────────
function addBotMsg(html, extraHTML){
  var wrap=document.createElement('div');
  wrap.className='rc-msg rc-bot';
  wrap.innerHTML='<div class="rc-ava">🍗</div><div class="rc-bubble">'+html+'</div>';
  messages.appendChild(wrap);
  if(extraHTML){
    var ext=document.createElement('div');
    ext.className='rc-extra';
    ext.innerHTML=extraHTML;
    messages.appendChild(ext);
  }
  scrollBot();
}

// ── ADD USER MSG ──────────────────────────────────────────────────
function addUserMsg(text){
  var wrap=document.createElement('div');
  wrap.className='rc-msg rc-user';
  wrap.innerHTML='<div class="rc-bubble">'+escHtml(text)+'</div>';
  messages.appendChild(wrap);
  scrollBot();
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── TYPING ────────────────────────────────────────────────────────
function showTyping(){
  var wrap=document.createElement('div');
  wrap.className='rc-msg rc-bot'; wrap.id='rc-typing';
  wrap.innerHTML='<div class="rc-ava">🍗</div><div class="rc-bubble"><div class="rc-typing"><span></span><span></span><span></span></div></div>';
  messages.appendChild(wrap); scrollBot();
}
function hideTyping(){ var t=document.getElementById('rc-typing'); if(t) t.remove(); }

// ── BUILD MENU TABLE ──────────────────────────────────────────────
function buildMenuTable(cats){
  var items=MENU.filter(function(i){ return !cats||cats.indexOf(i.cat)>-1; });
  var html='<div style="overflow-x:auto"><table class="rc-menu-table"><thead><tr><th>Item</th><th>Price</th></tr></thead><tbody>';
  items.forEach(function(i){
    html+='<tr><td><strong>'+i.name+'</strong><br><span style="color:#777;font-size:11px">'+i.desc+'</span></td><td style="white-space:nowrap;font-weight:700;color:#e31837">'+i.price+'</td></tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

// ── BUILD LOC CARDS ───────────────────────────────────────────────
function buildLocCards(country){
  var locs=LOCS.filter(function(l){ return l.country===country; });
  return locs.map(function(l){
    return '<div class="rc-loc-card">'
      +'<div class="rc-loc-name">📍 '+l.name+'</div>'
      +'<div class="rc-loc-addr">'+l.addr+'</div>'
      +'<div class="rc-loc-hours">⏰ '+l.hours+'</div>'
      +(l.phone?'<div class="rc-loc-phone">📞 '+l.phone+'</div>':'')
      +'<a href="'+l.map+'" target="_blank">Get Directions →</a>'
      +'</div>';
  }).join('');
}

// ── BUILD CALL CARD ───────────────────────────────────────────────
function buildCallCard(phone, label){
  phone=phone||'02 492 6862';
  label=label||'UAE – Abu Dhabi (Galleria)';
  var tel=phone.replace(/\s/g,'');
  return '<div class="rc-call-card">'
    +'<p>📞 Speak With Our Team — '+label+'</p>'
    +'<div class="rc-phone">'+phone+'</div>'
    +'<p style="opacity:.7;font-size:11px;margin-top:4px">Fastest way to get accurate answers!</p>'
    +'<a class="rc-call-now" href="tel:'+tel+'">Call Now</a>'
    +'</div>';
}

// ── BUILD LEAD FORM ───────────────────────────────────────────────
function buildLeadForm(type){
  var titles={catering:"🍗 Catering Inquiry",complaint:"💬 Share Your Feedback",franchise:"🤝 Franchise Inquiry",default:"📝 Leave Your Details"};
  var title=titles[type]||titles.default;
  var extra='';
  if(type==='catering'){
    extra='<input type="text" id="lf_date" placeholder="Event Date (approx.)"/>'
         +'<input type="number" id="lf_guests" placeholder="Number of Guests"/>';
  }
  return '<div class="rc-lead-form" id="rc-lead-form">'
    +'<h5>'+title+'</h5>'
    +'<input type="text" id="lf_name" placeholder="Your Name *"/>'
    +'<input type="tel" id="lf_phone" placeholder="Phone Number *"/>'
    +'<input type="email" id="lf_email" placeholder="Email Address"/>'
    +extra
    +'<select id="lf_reason">'
    +'<option value="">What\'s this about?</option>'
    +'<option>Catering Inquiry</option>'
    +'<option>General Question</option>'
    +'<option>Complaint / Feedback</option>'
    +'<option>Franchise Inquiry</option>'
    +'<option>Other</option>'
    +'</select>'
    +'<textarea id="lf_msg" placeholder="Additional message (optional)…"></textarea>'
    +'<button id="lf_submit">Send Message 🍗</button>'
    +'</div>';
}

// attach submit dynamically
document.addEventListener('click', function(e){
  if(e.target && e.target.id==='lf_submit'){
    var name=document.getElementById('lf_name');
    var phone=document.getElementById('lf_phone');
    if(!name||!name.value.trim()||!phone||!phone.value.trim()){
      alert('Please enter your name and phone number.'); return;
    }
    var n=name.value.trim(), p=phone.value.trim();
    var form=document.getElementById('rc-lead-form');
    if(form) form.remove();
    addBotMsg('✅ <strong>Got it, '+escHtml(n)+'!</strong> Our team will contact you at <strong>'+escHtml(p)+'</strong> shortly.<br><br>Thank you for choosing Raising Cane\'s! 🍗❤️');
    showQR(["View Menu 🍗","Find a Branch 📍","Order Now 🛒"]);
  }
});

// ── REPLY ENGINE ──────────────────────────────────────────────────
function getMatch(text){
  var lower=text.toLowerCase();
  for(var i=0;i<FAQ.length;i++){
    var item=FAQ[i];
    for(var j=0;j<item.q.length;j++){
      if(lower.indexOf(item.q[j])>-1) return item;
    }
  }
  return null;
}

function processReply(match, raw){
  if(!match){
    addBotMsg("Hmm, I'd love to help with that! Let me connect you with our team for the most accurate answer. 😊", buildCallCard());
    showQR(["View Menu 🍗","Find a Branch 📍","Leave a Message 📝"]);
    return;
  }

  var type=match.type||'';

  if(type==='menu'){
    addBotMsg("Here's our full menu 🍗", buildMenuTable(null));
    showQR(["Combos Only 🍗","Tailgates 📦","Sides & Drinks 🥤","Order Now 🛒"]);
    return;
  }
  if(type==='menu_Combos'){
    addBotMsg("Our Combo Meals 🍗", buildMenuTable(['Combos']));
    showQR(["Tailgates 📦","Sides & Drinks 🥤","Order Now 🛒"]);
    return;
  }
  if(type==='menu_Tailgates'){
    addBotMsg("Our Tailgate Packages 📦 — Perfect for groups & events!", buildMenuTable(['Tailgates']));
    showQR(["Combos 🍗","Order Now 🛒","Catering Inquiry 🎉"]);
    return;
  }
  if(type==='menu_Sides_Drinks'){
    addBotMsg("Sides & Drinks 🥤", buildMenuTable(['Sides','Drinks']));
    showQR(["Combos 🍗","Full Menu","Order Now 🛒"]);
    return;
  }
  if(type==='call_card'){
    addBotMsg("Our team is ready for you right now! 📞", buildCallCard());
    showQR(["Find My Branch 📍","Leave Contact Details 📝"]);
    return;
  }
  if(type && type.indexOf('locations_')===0){
    var country=type.replace('locations_','');
    addBotMsg('<strong>'+country+'</strong> Locations 📍', buildLocCards(country));
    showQR(["Hours & Timing ⏰","Order Now 🛒","Call Us 📞"]);
    return;
  }
  if(type==='catering'){
    addBotMsg("We'd love to cater your event! 🎉 Please fill in the details below:", buildLeadForm('catering'));
    return;
  }
  if(type==='complaint'){
    addBotMsg("I'm sorry to hear you had an issue! 😔 Our team would love to make it right. Please share your details:", buildLeadForm('complaint'));
    return;
  }
  if(type==='franchise'){
    addBotMsg("Exciting! Let us connect you with the right person for franchise opportunities. 🤝", buildLeadForm('franchise'));
    return;
  }

  // quick-reply shorthand checks
  var low=raw.toLowerCase();
  if(low.indexOf('combos only')>-1||low.indexOf('combo only')>-1){
    addBotMsg("Our Combo Meals 🍗", buildMenuTable(['Combos']));
    showQR(["Tailgates 📦","Sides & Drinks 🥤","Order Now 🛒"]);
    return;
  }
  if(low.indexOf('tailgate')>-1){
    addBotMsg("Our Tailgate Packages 📦", buildMenuTable(['Tailgates']));
    showQR(["Combos 🍗","Order Now 🛒"]);
    return;
  }
  if(low.indexOf('sides')>-1||low.indexOf('drinks')>-1){
    addBotMsg("Sides & Drinks 🥤", buildMenuTable(['Sides','Drinks']));
    showQR(["Combos 🍗","Full Menu","Order Now 🛒"]);
    return;
  }
  if(low.indexOf('talabat')>-1){
    addBotMsg("Order on <strong>Talabat</strong> 📱 — click below:",
      '<a href="https://www.talabat.com" target="_blank" style="display:inline-block;background:#e31837;color:white;padding:10px 20px;border-radius:20px;text-decoration:none;font-weight:700;margin-top:4px">Open Talabat 🛵</a>');
    return;
  }
  if(low.indexOf('deliveroo')>-1){
    addBotMsg("Order on <strong>Deliveroo</strong> 📱 — click below:",
      '<a href="https://www.deliveroo.ae" target="_blank" style="display:inline-block;background:#e31837;color:white;padding:10px 20px;border-radius:20px;text-decoration:none;font-weight:700;margin-top:4px">Open Deliveroo 🛵</a>');
    return;
  }
  if(low.indexOf('leave a message')>-1||low.indexOf('leave contact')>-1){
    addBotMsg("Sure! Fill in your details and our team will reach out shortly 😊", buildLeadForm('default'));
    return;
  }

  // plain text reply
  addBotMsg(match.a||'');
  if(match.qr) showQR(match.qr);
}

// ── SEND MSG ──────────────────────────────────────────────────────
function sendMsg(text){
  clearQR();
  addUserMsg(text);
  input.value=''; input.style.height='auto';
  showTyping();
  var delay=600+Math.random()*400;
  setTimeout(function(){
    hideTyping();
    var match=getMatch(text);
    processReply(match, text);
  }, delay);
}

// ── GREET ─────────────────────────────────────────────────────────
function doGreet(){
  showTyping();
  setTimeout(function(){
    hideTyping();
    addBotMsg('👋 <strong>Welcome to Raising Cane\'s!</strong><br><br>I\'m here to help you with our menu, locations, orders, catering & more. How can I help you today? 🍗');
    showQR(["View Menu 🍗","Find a Branch 📍","Place Order 🛒","Catering 🎉","Contact Us 💬"]);
  },900);
}

})(); // end IIFE
